name: Integration Tests (aepbase)

on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  integration-test:
    name: Terraform Provider Integration Tests (aepbase)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - '1.4.*'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - name: Start aepbase
        run: ./scripts/start-aepbase.sh

      - name: Run integration tests
        env:
          TF_ACC: "1"
          AEPBASE_URL: "http://localhost:8081"
        run: go test -v -cover -run TestIntegration ./internal/provider/
        timeout-minutes: 10

      - name: Stop aepbase
        if: always()
        run: |
          if [ -f /tmp/aepbase.pid ]; then
            kill "$(cat /tmp/aepbase.pid)" || true
          fi
